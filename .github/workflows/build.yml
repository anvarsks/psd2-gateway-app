name: Build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn test

      - name: Run TPP tests
        run: mvn -f tpp-client-app/pom.xml test

      - name: Run adapter tests
        run: mvn -f adapter-dnb/pom.xml test

      - name: Run mock bank tests
        run: mvn -f mock-dnb-bank/pom.xml test

      - name: Validate base Compose
        run: docker compose -f deploy/docker-compose.yml config

      - name: Prepare env file
        run: cp .env.example .env

      - name: Validate observability Compose
        run: docker compose --env-file .env -f deploy/docker-compose.yml --profile observability config
