services:
  psd2-gateway-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: psd2-gateway-app
    networks:
      - psd2-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  kong:
    image: kong:3.7
    container_name: kong-psd2-gateway
    depends_on:
      psd2-gateway-app:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_STATUS_LISTEN: 0.0.0.0:8100
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8100:8100"
    volumes:
      - ./kong/kong.yml:/opt/kong/kong.yml:ro
    networks:
      - psd2-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  psd2-net:
    driver: bridge
