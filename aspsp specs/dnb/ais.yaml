servers:
  - url: /v1
components:
  schemas:
    AccountDetails:
      type: object
      required:
        - currency
      properties:
        _links:
          $ref: '#/components/schemas/LinksAccountDetails'
        balances:
          type: array
          description: Get balances
          items:
            $ref: '#/components/schemas/Balance'
        bban:
          type: string
          description: >-
            Basic Bank Account Number (BBAN) Identifier  This data element can
            be used in the body of the Consent Request Message for retrieving
            Account access Consent from this Account. This data elements is used
            for payment Accounts which have no IBAN. ISO20022: Basic Bank
            Account Number (BBAN). Identifier used nationally by financial
            institutions, i.e., in individual countries, generally as part of a
            National Account Numbering Scheme(s), which uniquely identifies the
            account of a customer.
          pattern: '[a-zA-Z0-9]{1,30}'
        bic:
          type: string
          description: 'BICFI '
          pattern: '[A-Z]{6,6}[A-Z2-9][A-NP-Z0-9]([A-Z0-9]{3,3}){0,1}'
        currency:
          type: string
          description: 'ISO 4217 Alpha 3 currency code '
        iban:
          type: string
          description: IBAN of an account
          pattern: '[A-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}'
        name:
          type: string
          description: Name of the account given by the bank or the PSU in online-banking.
          minLength: 0
          maxLength: 35
        ownerName:
          type: string
          description: Name of the legal account owner.
          minLength: 0
          maxLength: 140
        status:
          type: string
          description: Get status
          enum:
            - enabled
            - deleted
            - blocked
        usage:
          type: string
          description: >-
            Specifies the usage of the account   * PRIV: private personal
            account   * ORGA: professional account
          minLength: 0
          maxLength: 4
          enum:
            - PRIV
            - ORGA
      title: AccountDetails
      description: "The ASPSP shall give at least one of the account reference identifiers:\n\t- iban\n\t- bban\n\t- pan\n\t- maskedPan\n\t- msisdn\nIf the account is a multicurrency account currency code in \"currency\" is set to \"XXX\"."
      referenceName: AccountDetails
    AccountList:
      type: object
      required:
        - accounts
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountDetails'
      title: AccountList
      description: 'List of accounts with details. '
      referenceName: AccountList
    AccountReference:
      type: object
      properties:
        bban:
          type: string
          description: >-
            Basic Bank Account Number (BBAN) Identifier  This data element can
            be used in the body of the Consent Request Message for retrieving
            Account access Consent from this Account. This data elements is used
            for payment Accounts which have no IBAN. ISO20022: Basic Bank
            Account Number (BBAN). Identifier used nationally by financial
            institutions, i.e., in individual countries, generally as part of a
            National Account Numbering Scheme(s), which uniquely identifies the
            account of a customer.
          pattern: '[a-zA-Z0-9]{1,30}'
        currency:
          type: string
          description: ISO 4217 Alpha 3 currency code
        iban:
          type: string
          description: IBAN of an account
          pattern: ^[A-Z]{2,2}[0-9]{2,2}[a-zA-Z0-9]{1,30}
        maskedPan:
          type: string
          description: Masked Primary Account Number
          minLength: 0
          maxLength: 35
        msisdn:
          type: string
          description: Mobile phone number.
        pan:
          type: string
          description: Primary Account Number according to ISO/IEC 7812.
          minLength: 0
          maxLength: 35
      title: AccountReference
      description: "Reference to an account by either\n\t* IBAN, of a payment accounts, or\n\t* BBAN, for payment accounts if there is no IBAN, or\n\t* the Primary Account Number (PAN) of a card, can be tokenised by the ASPSP due to PCI DSS requirements, or\n\t* the Primary Account Number (PAN) of a card in a masked form, or\n\t* an alias to access a payment account via a registered mobile phone number (MSISDN)."
      referenceName: AccountReference
    AccountReport:
      type: object
      required:
        - links
      properties:
        booked:
          type: array
          description: Get booked
          items:
            $ref: '#/components/schemas/TransactionDetails'
        links:
          type: object
          description: Get links
          additionalProperties:
            $ref: '#/components/schemas/HrefType'
        pending:
          type: array
          description: Get pending
          items:
            $ref: '#/components/schemas/TransactionDetails'
      title: AccountReport
      description: >-
        JSON based account report. This account report contains transactions
        resulting from the query parameters.

        'booked' shall be contained if bookingStatus parameter is set to
        "booked" or "both".

        'pending' is not contained if the bookingStatus parameter is set to
        "booked". 
      referenceName: AccountReport
    Address:
      type: object
      required:
        - country
      properties:
        buildingNumber:
          type: string
        city:
          type: string
        country:
          type: string
          description: ISO 3166 ALPHA2 country code
          pattern: '[A-Z]{2}'
        postalCode:
          type: string
        street:
          type: string
          minLength: 0
          maxLength: 70
      title: Address
      description: Address
      referenceName: Address
    AisAgreementStatusChangeReq:
      type: object
      required:
        - userId
      properties:
        aisLicenseIds:
          type: array
          items:
            type: integer
            format: int64
        enable:
          type: boolean
        userId:
          type: string
        valid:
          type: boolean
      title: AisAgreementStatusChangeReq
    AisAgreementStatusChangeResponse:
      type: object
      properties:
        modified:
          type: boolean
      title: AisAgreementStatusChangeResponse
    Amount:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          description: "The amount given with fractional digits, where fractions must be compliant to the currency definition. Up to 14 significant figures. Negative amounts are signed by minus. The decimal separator is a dot.  **Example:** Valid representations for EUR with up to two decimals are:\n\t* 1056\n\t* 5768.2\n\t* -1.50\n\t* 5877.78"
          pattern: '-?[0-9]{1,14}(\.[0-9]{1,3})?'
        currency:
          type: string
          description: ISO 4217 Alpha 3 currency code
      title: Amount
      description: Amount
      referenceName: Amount
    AuthenticationObject:
      type: object
      required:
        - authenticationMethodId
        - authenticationType
      properties:
        authenticationMethodId:
          type: string
          description: >-
            An identification provided by the ASPSP for the later identification
            of the authentication method selection.
          minLength: 0
          maxLength: 35
        authenticationType:
          type: string
          enum:
            - SMS_OTP
            - CHIP_OTP
            - PHOTO_OTP
            - PUSH_OTP
        authenticationVersion:
          type: string
          description: >-
            Depending on the "authenticationType". This version can be used by
            differentiating authentication tools used within  performing OTP
            generation in the same authentication type. This version can be
            referred to in the ASPSPs documentation.
        explanation:
          type: string
          description: Detailed information about the SCA method for the PSU.
        name:
          type: string
          description: >-
            This is the name of the authentication method defined by the PSU in
            the Online Banking frontend of the ASPSP. Alternatively this could
            be a description provided by the ASPSP like "SMS OTP on phone
            +49160xxxxx 28". This name shall be used by the TPP when presenting
            a list of authentication methods to the PSU, if available. 
      title: AuthenticationObject
      description: Authentication Object
      referenceName: AuthenticationObject
    AuthenticationStatus:
      type: object
      properties:
        authResult:
          type: string
          enum:
            - Ok
            - Failed
            - NoAccess
            - TechnicalError
        blob:
          type: string
        message:
          type: string
      title: AuthenticationStatus
    Balance:
      type: object
      required:
        - balanceAmount
        - balanceType
      properties:
        balanceAmount:
          $ref: '#/components/schemas/Amount'
        balanceType:
          type: string
          enum:
            - closingBooked
            - expected
            - authorised
            - openingBooked
            - interimAvailable
            - forwardAvailable
            - nonInvoiced
        lastChangeDateTime:
          type: string
          format: date-time
          description: >-
            This data element might be used to indicate e.g. with the expected
            or booked balance that no action is known  on the account, which is
            not yet booked.
        lastCommittedTransaction:
          type: string
          description: >-
            "entryReference" of the last commited transaction to support the TPP
            in identifying whether all  PSU transactions are already known.
          minLength: 0
          maxLength: 35
        referenceDate:
          type: string
          format: date
          description: Reference date of the balance
      title: Balance
      description: 'A single balance element '
      referenceName: Balance
    CardAccountBalancesResponse:
      type: object
      required:
        - balances
        - cardAccount
      properties:
        balances:
          type: array
          description: balances
          items:
            $ref: '#/components/schemas/Balance'
        cardAccount:
          $ref: '#/components/schemas/AccountReference'
      title: CardAccountBalancesResponse
      referenceName: CardAccountBalancesResponse
    CardAccountDetails:
      type: object
      required:
        - currency
        - maskedPan
      properties:
        _links:
          $ref: '#/components/schemas/LinksAccountDetails'
        balances:
          type: array
          items:
            $ref: '#/components/schemas/Balance'
        creditLimit:
          $ref: '#/components/schemas/Amount'
        currency:
          type: string
          description: 'ISO 4217 Alpha 3 currency code '
          pattern: '[A-Z]{3}'
        details:
          type: string
          description: >-
            Specifications that might be provided by the ASPSP   -
            characteristics of the account   - characteristics of the relevant
            card 
          minLength: 0
          maxLength: 140
        maskedPan:
          type: string
          description: 'Masked Primary Account Number '
          minLength: 0
          maxLength: 35
        name:
          type: string
          description: Name of the account given by the bank or the PSU in online-banking.
          minLength: 0
          maxLength: 35
        ownerName:
          type: string
          description: Name of the legal account owner.
          minLength: 0
          maxLength: 140
        product:
          type: string
          description: Product name of the bank for this account, proprietary definition.
          minLength: 0
          maxLength: 35
        resourceId:
          type: string
          description: >-
            This is the data element to be used in the path when retrieving data
