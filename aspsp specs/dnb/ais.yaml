        startAuthorisationWithPsuAuthentication:
          $ref: '#/components/schemas/HrefType'
        updatePsuIdentification:
          $ref: '#/components/schemas/HrefType'
      title: LinksStartScaProcess
      description: >-
        A list of hyperlinks to be recognised by the TPP. The actual hyperlinks
        used in the response depend on the dynamical decisions of the ASPSP when
        processing the request.**Remark:** All links can be relative or full
        links, to be decided by the ASPSP.  Type of links admitted in this
        response, (further links might be added for ASPSP defined extensions): 
        - 'scaRedirect':   In case of an SCA Redirect Approach, the ASPSP is
        transmitting the link to which to   redirect the PSU browser. -
        'scaOAuth':   In case of a SCA OAuth2 Approach, the ASPSP is
        transmitting the URI where the configuration of the Authorisation Server
        can be retrieved. The configuration follows the OAuth 2.0 Authorisation
        Server Metadata specification. - 'updatePsuIdentification':   The link
        to the authorisation or cancellation authorisation sub-resource,   where
        PSU identification data needs to be uploaded. -
        'startAuthorisationWithPsuAuthentication':   The link to the
        authorisation or cancellation authorisation sub-resource,   where PSU
        authentication data needs to be uploaded.   *
        'startAuthorisationWithEncryptedPsuAuthentication':     Same as
        startAuthorisactionWithPsuAuthentication where the authentication data
        need to be encrypted on     application layer in uploading. -
        'selectAuthenticationMethod':   The link to the authorisation or
        cancellation authorisation sub-resource,   where the selected
        authentication method needs to be uploaded.   This link is contained
        under exactly the same conditions as the data element 'scaMethods'. -
        'authoriseTransaction':   The link to the authorisation or cancellation
        authorisation sub-resource,   where the authorisation data has to be
        uploaded, e.g. the TOP received by SMS. - 'scaStatus':   The link to
        retrieve the scaStatus of the corresponding authorisation sub-resource. 
      referenceName: LinksStartScaProcess
    LinksTransactionsPagination:
      type: object
      required:
        - next
      properties:
        next:
