spring.application.name=mock-dnb-bank
server.port=9444
management.endpoints.web.exposure.include=health,info
server.ssl.enabled=true
server.ssl.key-store=${MOCK_DNB_BANK_KEY_STORE_PATH:/certs/mock-dnb-bank.p12}
server.ssl.key-store-password=${MOCK_DNB_BANK_KEY_STORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.trust-store=${MOCK_DNB_BANK_TRUST_STORE_PATH:/certs/mock-dnb-bank-truststore.p12}
server.ssl.trust-store-password=${MOCK_DNB_BANK_TRUST_STORE_PASSWORD:changeit}
server.ssl.trust-store-type=PKCS12
server.ssl.client-auth=need
internal.policy.path=${INTERNAL_ACCESS_POLICY_PATH:/policy/mock-dnb-access-policy.yml}
