spring.application.name=psd2-gateway-app
server.port=8080
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
logging.file.name=${APP_LOG_FILE:/var/log/psd2-gateway-app/application.log}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:psd2gateway;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.sql.init.mode=always
internal.adapter.dnb.base-url=${INTERNAL_ADAPTER_DNB_BASE_URL:https://adapter-dnb:9443}
internal.adapter.dnb.account-summary-path=${INTERNAL_ADAPTER_DNB_ACCOUNT_SUMMARY_PATH:/internal/dnb/accounts/summary}
internal.adapter.dnb.consents-path=${INTERNAL_ADAPTER_DNB_CONSENTS_PATH:/internal/dnb/consents}
internal.adapter.dnb.accounts-path=${INTERNAL_ADAPTER_DNB_ACCOUNTS_PATH:/internal/dnb/accounts}
internal.adapter.dnb.key-store-path=${INTERNAL_ADAPTER_DNB_KEY_STORE_PATH:/certs/gateway-client.p12}
internal.adapter.dnb.key-store-password=${INTERNAL_ADAPTER_DNB_KEY_STORE_PASSWORD:changeit}
internal.adapter.dnb.trust-store-path=${INTERNAL_ADAPTER_DNB_TRUST_STORE_PATH:/certs/gateway-truststore.p12}
internal.adapter.dnb.trust-store-password=${INTERNAL_ADAPTER_DNB_TRUST_STORE_PASSWORD:changeit}
