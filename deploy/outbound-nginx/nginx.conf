events {}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$ssl_client_s_dn" "$ssl_client_verify"';

    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    upstream mock_dnb_upstream {
        server mock-dnb-bank:9444;
    }

    server {
        listen 9445 ssl;
        server_name outbound-dnb-apigw;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_client_certificate /etc/nginx/certs/ca.crt;
        ssl_verify_client on;
        ssl_verify_depth 2;
        ssl_protocols TLSv1.2 TLSv1.3;

        if ($ssl_client_s_dn != "CN=adapter-dnb,O=Adapter DNB,C=NO") {
            return 403;
        }

        location / {
            proxy_pass https://mock_dnb_upstream;
            proxy_ssl_certificate /etc/nginx/certs/client.crt;
            proxy_ssl_certificate_key /etc/nginx/certs/client.key;
            proxy_ssl_trusted_certificate /etc/nginx/certs/ca.crt;
            proxy_ssl_verify on;
            proxy_ssl_verify_depth 2;
            proxy_ssl_server_name on;
            proxy_ssl_name mock-dnb-bank;

            proxy_set_header Host mock-dnb-bank;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
            proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;
            proxy_set_header X-SSL-Issuer-DN $ssl_client_i_dn;
        }
    }
}
