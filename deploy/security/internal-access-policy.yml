clients:
  - clientDn: "CN=psd2-gateway-app,O=PSD2 Gateway,C=NO"
    allowedEndpoints:
      - method: "GET"
        path: "/internal/dnb/accounts/summary"
      - method: "POST"
        path: "/internal/dnb/consents"
      - method: "GET"
        path: "/internal/dnb/consents/{consentId}"
      - method: "DELETE"
        path: "/internal/dnb/consents/{consentId}"
      - method: "GET"
        path: "/internal/dnb/consents/{consentId}/status"
      - method: "GET"
        path: "/internal/dnb/accounts"
      - method: "GET"
        path: "/internal/dnb/accounts/{accountNumber}"
      - method: "GET"
        path: "/internal/dnb/accounts/{accountNumber}/balances"
