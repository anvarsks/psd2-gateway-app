services:
  postgres:
    image: postgres:16-alpine
    container_name: psd2-postgres
    environment:
      POSTGRES_DB: ${PSD2_GATEWAY_DB_NAME:-psd2_gateway}
      POSTGRES_USER: ${PSD2_GATEWAY_DB_USER:-psd2}
      POSTGRES_PASSWORD: ${PSD2_GATEWAY_DB_PASSWORD:-psd2}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - psd2-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PSD2_GATEWAY_DB_USER:-psd2} -d ${PSD2_GATEWAY_DB_NAME:-psd2_gateway}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  psd2-gateway-app:
    image: ${PSD2_GATEWAY_IMAGE}
    container_name: psd2-gateway-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_LOG_FILE: /var/log/psd2-gateway-app/application.log
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${PSD2_GATEWAY_DB_NAME:-psd2_gateway}
      SPRING_DATASOURCE_USERNAME: ${PSD2_GATEWAY_DB_USER:-psd2}
      SPRING_DATASOURCE_PASSWORD: ${PSD2_GATEWAY_DB_PASSWORD:-psd2}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      INTERNAL_ADAPTER_DNB_BASE_URL: https://adapter-dnb:9443
      INTERNAL_ADAPTER_DNB_KEY_STORE_PATH: /certs/gateway-client.p12
      INTERNAL_ADAPTER_DNB_KEY_STORE_PASSWORD: changeit
      INTERNAL_ADAPTER_DNB_TRUST_STORE_PATH: /certs/gateway-truststore.p12
      INTERNAL_ADAPTER_DNB_TRUST_STORE_PASSWORD: changeit
    volumes:
      - ../runtime-logs/app:/var/log/psd2-gateway-app
      - ./certs/generated:/certs:ro
    networks:
      - psd2-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  adapter-dnb:
    image: ${ADAPTER_DNB_IMAGE}
    container_name: adapter-dnb
    depends_on:
      - outbound-dnb-apigw
    environment:
      ADAPTER_LOG_FILE: /var/log/adapter-dnb/application.log
      ADAPTER_DNB_KEY_STORE_PATH: /certs/adapter-dnb.p12
      ADAPTER_DNB_KEY_STORE_PASSWORD: changeit
      ADAPTER_DNB_TRUST_STORE_PATH: /certs/adapter-dnb-truststore.p12
      ADAPTER_DNB_TRUST_STORE_PASSWORD: changeit
      MOCK_DNB_BANK_BASE_URL: https://outbound-dnb-apigw:9445
      MOCK_DNB_BANK_KEY_STORE_PATH: /certs/adapter-dnb.p12
      MOCK_DNB_BANK_KEY_STORE_PASSWORD: changeit
      MOCK_DNB_BANK_TRUST_STORE_PATH: /certs/adapter-dnb-truststore.p12
      MOCK_DNB_BANK_TRUST_STORE_PASSWORD: changeit
      INTERNAL_ACCESS_POLICY_PATH: /policy/internal-access-policy.yml
    volumes:
      - ./certs/generated:/certs:ro
      - ./security:/policy:ro
      - ../runtime-logs/adapter-dnb:/var/log/adapter-dnb
    networks:
      - psd2-net

  outbound-dnb-apigw:
    image: nginx:1.27-alpine
    container_name: outbound-dnb-apigw
    depends_on:
      - mock-dnb-bank
    volumes:
      - ./outbound-nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/generated/outbound-dnb-apigw.crt:/etc/nginx/certs/server.crt:ro
      - ./certs/generated/outbound-dnb-apigw.key:/etc/nginx/certs/server.key:ro
      - ./certs/generated/outbound-dnb-apigw.crt:/etc/nginx/certs/client.crt:ro
      - ./certs/generated/outbound-dnb-apigw.key:/etc/nginx/certs/client.key:ro
      - ./certs/generated/ca.crt:/etc/nginx/certs/ca.crt:ro
    networks:
      - psd2-net

  mock-dnb-bank:
    image: ${MOCK_DNB_BANK_IMAGE:-deploy-mock-dnb-bank:latest}
    container_name: mock-dnb-bank
    environment:
      MOCK_DNB_BANK_KEY_STORE_PATH: /certs/mock-dnb-bank.p12
      MOCK_DNB_BANK_KEY_STORE_PASSWORD: changeit
      MOCK_DNB_BANK_TRUST_STORE_PATH: /certs/mock-dnb-bank-truststore.p12
      MOCK_DNB_BANK_TRUST_STORE_PASSWORD: changeit
      INTERNAL_ACCESS_POLICY_PATH: /policy/mock-dnb-access-policy.yml
    volumes:
      - ./certs/generated:/certs:ro
      - ./security:/policy:ro
    networks:
      - psd2-net

  kong:
    image: kong:3.7
    container_name: kong-psd2-gateway
    depends_on:
      psd2-gateway-app:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_PROXY_ACCESS_LOG: /var/log/kong/proxy-access.log
      KONG_ADMIN_ACCESS_LOG: /var/log/kong/admin-access.log
      KONG_PROXY_ERROR_LOG: /var/log/kong/proxy-error.log
      KONG_ADMIN_ERROR_LOG: /var/log/kong/admin-error.log
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_STATUS_LISTEN: 0.0.0.0:8100
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8100:8100"
    volumes:
      - ./kong/kong.yml:/opt/kong/kong.yml:ro
      - ../runtime-logs/kong:/var/log/kong
    networks:
      - psd2-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx-edge:
    image: nginx:1.27-alpine
    container_name: nginx-psd2-edge
    depends_on:
      - kong
    ports:
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/generated/kong.crt:/etc/nginx/certs/server.crt:ro
      - ./certs/generated/kong.key:/etc/nginx/certs/server.key:ro
      - ./certs/generated/ca.crt:/etc/nginx/certs/ca.crt:ro
    networks:
      - psd2-net

networks:
  psd2-net:
    driver: bridge

volumes:
  postgres-data:
